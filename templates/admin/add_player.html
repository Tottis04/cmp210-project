<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Player — Crocodile Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg:      #1c1f28;
            --nav-bg:  #191c23;
            --surface: #242830;
            --border:  #2e3340;
            --accent:  #4a7cf7;
            --text:    #d0d5df;
            --muted:   #6b7280;
            --input-bg:#181b22;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-top: 54px;
        }

        .top-nav {
            background: var(--nav-bg) !important;
            border-bottom: 1px solid var(--border);
            min-height: 54px; padding: 0 20px;
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }

        .top-nav .navbar-brand {
            display: flex; align-items: center; gap: 9px;
            padding: 0; margin-right: 24px; text-decoration: none;
        }

        .logo-mark {
            width: 30px; height: 30px; background: var(--accent);
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; font-weight: 700; font-size: 12px;
            color: #fff; flex-shrink: 0;
        }

        .brand-label { font-size: 13px; font-weight: 600; color: #e2e6ef; }

        .top-nav .nav-link {
            color: #7d8699 !important; font-size: 13px;
            padding: 6px 10px !important; border-radius: 5px;
            transition: color .12s, background .12s; white-space: nowrap;
        }

        .top-nav .nav-link:hover { color: var(--text) !important; background: rgba(255,255,255,.04); }
        .top-nav .nav-link.active { color: #c6d4ff !important; background: rgba(74,124,247,.10); }

        .btn-nav-logout {
            font-size: 13px; font-family: inherit; color: var(--muted);
            background: transparent; border: 1px solid var(--border);
            border-radius: 6px; padding: 5px 13px; text-decoration: none;
            white-space: nowrap; transition: color .12s, border-color .12s;
        }

        .btn-nav-logout:hover { color: #e57368; border-color: rgba(192,57,43,.4); text-decoration: none; }

        .navbar-toggler { border-color: var(--border) !important; padding: 4px 9px; }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
        }

        @media (max-width: 767px) {
            .top-nav .navbar-collapse {
                background: var(--nav-bg); border-top: 1px solid var(--border);
                padding: 8px 0 12px; margin: 0 -20px; padding-left: 20px;
            }
            .top-nav .nav-link { border-radius: 0; }
            .btn-nav-logout { margin: 8px 0 0 0; display: inline-block; }
        }

        .page-wrap { max-width: 520px; margin: 0 auto; padding: 36px 24px 56px; }

        .page-hdr { margin-bottom: 24px; }
        .page-title { font-size: 20px; font-weight: 700; color: #e2e6ef; margin-bottom: 4px; }
        .page-sub   { font-size: 13px; color: var(--muted); }

        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 28px 28px 24px;
            box-shadow: 0 2px 10px rgba(0,0,0,.3);
        }

        .field { margin-bottom: 18px; }

        .field-label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--muted); text-transform: uppercase;
            letter-spacing: .7px; margin-bottom: 7px;
        }

        .field-input {
            width: 100%; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 7px;
            color: var(--text); font-size: 14px; font-family: inherit;
            padding: 10px 13px; outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .field-input::placeholder { color: #3e4450; }

        .field-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74,124,247,.12);
        }

        .form-actions { display: flex; align-items: center; gap: 12px; margin-top: 24px; }

        .btn-submit {
            padding: 9px 22px; background: var(--accent);
            color: #fff; border: none; border-radius: 7px;
            font-size: 14px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: background .15s;
        }

        .btn-submit:hover { background: #3a6ce0; }

        .btn-cancel { font-size: 13px; color: var(--muted); text-decoration: none; transition: color .12s; }
        .btn-cancel:hover { color: var(--text); text-decoration: none; }

        @media (max-width: 560px) {
            .page-wrap { padding: 24px 16px 44px; }
            .form-card { padding: 22px 20px 20px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-md top-nav">
        <div class="container-fluid px-0">
            <a class="navbar-brand" href="/admin/dashboard">
                <div class="logo-mark">CA</div>
                <span class="brand-label">Crocodile Analytics</span>
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto gap-1">
                    <li class="nav-item"><a class="nav-link" href="/admin/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/teams">Teams</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/players">Players</a></li>
                    <li class="nav-item"><a class="nav-link" href="/matches">Matches</a></li>
                    <li class="nav-item"><a class="nav-link" href="/statistics">Statistics</a></li>
                    <li class="nav-item"><a class="nav-link" href="/api-info">API</a></li>
                </ul>
                <a href="/logout" class="btn-nav-logout ms-2">Logout</a>
            </div>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="page-hdr">
            <h1 class="page-title">Add Player</h1>
            <p class="page-sub">Fill in the details below to register a new player.</p>
        </div>

        <div class="form-card">
            <form method="POST">
                <div class="field">
                    <label class="field-label" for="name">Player Name</label>
                    <input class="field-input" type="text" id="name"
                           name="name" placeholder="e.g. John Doe" required>
                </div>
                <div class="field">
                    <label class="field-label" for="age">Age</label>
                    <input class="field-input" type="number" id="age"
                           name="age" placeholder="e.g. 23" min="1" max="99" required>
                </div>
                <div class="field">
                    <label class="field-label" for="team">Team</label>
                    <input class="field-input" type="text" id="team"
                           name="team" placeholder="e.g. FC Barcelona" required>
                </div>
                <div class="field">
                    <label class="field-label" for="position">Position</label>
                    <input class="field-input" type="text" id="position"
                           name="position" placeholder="e.g. Forward" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">Add Player</button>
                    <a href="/players" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
