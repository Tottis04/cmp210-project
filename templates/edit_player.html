<!DOCTYPE html>
<html>

<head>
    <title>Edit Player</title>
</head>

<body>

    <h1>Edit Player</h1>

    <form method="POST">

        <input type="text" name="name" value="{{ player[1] }}">

        <br><br>

        <input type="number" name="age" value="{{ player[2] }}">

        <br><br>

        <input type="text" name="team" value="{{ player[3] }}">

        <br><br>

        <input type="text" name="position" value="{{ player[4] }}">

        <br><br>

        <button type="submit">
            Update Player
        </button>

    </form>

</body>

</html>
